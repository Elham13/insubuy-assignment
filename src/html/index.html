<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/dist/main.css" />
		<title>Insubuy Login</title>
	</head>
	<body>
		<main class="container">
			<section class="left" aria-labelledby="login-title">
				<h1 id="login-title" class="left__heading">Welcome Back</h1>
				<p class="left__description">
					Our MyAccount App allows you to access and manage your insurance information
					24/7.
				</p>

				<form class="left__form">
					<div class="left__form__group">
						<label for="email" class="left__form__label">Email</label>
						<input
							id="email"
							type="email"
							placeholder="Example@email.com"
							class="input left__form__input"
							required
							autocomplete="email"
						/>
					</div>

					<div class="left__form__group">
						<label for="password" class="left__form__label">Password</label>
						<input
							id="password"
							type="password"
							placeholder="At least 8 characters"
							class="input left__form__input"
							required
							autocomplete="current-password"
						/>
					</div>

					<div class="left__form__info">
						<a href="#" class="left__form__link">Forgot Password?</a>
					</div>

					<button type="submit" class="button button--primary left__form__button">
						Sign In
					</button>
				</form>

				<div class="left__sso">
					<div class="left__sso__separator__wrapper">
						<div class="left__sso__separator"></div>
						<p class="left__sso__label">Or sign in with</p>
						<div class="left__sso__separator"></div>
					</div>

					<div class="left__sso__wrapper">
						<button class="button button--sso left__sso__button">
							<img src="/src/assets/images/Google.svg" alt="Google logo" />
							<span>Google</span>
						</button>
						<button class="button button--sso left__sso__button">
							<img src="/src/assets/images/Facebook.svg" alt="Facebook logo" />
							<span>Facebook</span>
						</button>
					</div>
				</div>

				<div class="left__signup">
					<p>Don&apos;t you have an Account?</p>
					<a href="#">Signup</a>
				</div>

				<footer class="footer">
					<p>&copy; 2026 all rights reserved</p>
				</footer>
			</section>
			<section class="right">
				<img
					src="/src/assets/images/home-banner.svg"
					alt="Insurance management dashboard illustration"
				/>
			</section>
		</main>

		<script src="/src/js/main.js"></script>
	</body>
</html>
