<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/dist/main.css" />
		<title>Insubuy Login</title>
	</head>
	<body>
		<main class="container">
			<section class="left">
				<h1 class="left__heading">Welcome Back</h1>
				<p class="left__description">
					Our MyAccount App allows you to access and manage your insurance information
					24/7.
				</p>

				<form class="left__form">
					<div class="left__form__group">
						<label class="left__form__label">Email</label>
						<input
							type="email"
							placeholder="Example@email.com"
							class="left__form__input"
						/>
					</div>

					<div class="left__form__group">
						<label class="left__form__label">Password</label>
						<input
							type="password"
							placeholder="At least 8 characters"
							class="left__form__input"
						/>
					</div>

					<div class="left__form__info">
						<a href="#" class="left_form_link">Forgot Password?</a>
					</div>

					<button class="left__form__button">Sign In</button>
				</form>

				<div class="left__sso">
					<div class="left__sso__separator__wrapper">
						<div class="left__sso__separator"></div>
						<p class="left__sso_label">Or sign in with</p>
						<div class="left__sso__separator"></div>
					</div>

					<div class="left__sso_wrapper">
						<button class="left__sso_button">
							<img src="/src/assets/images/Google.svg" />
							<span>Google</span>
						</button>
						<button class="left__sso_button">
							<img src="/src/assets/images/Facebook.svg" />
							<span>Facebook</span>
						</button>
					</div>
				</div>

				<div class="left__signup">
					<p>Don&apos;t you have an Account?</p>
					<a href="#">Signup</a>
				</div>

				<footer class="footer">
					<p>&copy; 2026 all rights reserved</p>
				</footer>
			</section>
			<section class="right">
				<img src="/src/assets/images/home-banner.svg" />
			</section>
		</main>
	</body>
</html>
